<!DOCTYPE html>
<html>
<head>
    <title>Raj Cassette</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
        }

        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        #chat-box {
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            clear: both;
        }

        .user {
            background-color: #e6f2ff;
            border-left: 4px solid #0066cc;
            color: #003366;
        }

        .user-label {
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 5px;
            display: block;
        }

        .claude {
            background-color: #f6f8fa;
            border-left: 4px solid #24292e;
            color: #24292e;
        }

        .claude-label {
            font-weight: bold;
            color: #24292e;
            margin-bottom: 5px;
            display: block;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        #user-input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
        }

        button {
            padding: 12px 24px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>Raj Cassette</h1>

        <div id="chat-box"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..."/>
            <button id="send-btn" onclick="sendMessage()">Send</button>
            <button onclick="resetChat()" style="background-color: #cc3300;">Reset</button>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();

            if (!message) {
                chatBox.innerHTML += `<div class="message claude"><span class="claude-label">Error:</span> Please type a message first.</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            chatBox.innerHTML += `<div class="message user"><span class="user-label">You:</span> ${escapeHtml(message)}</div>`;
            input.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "...";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (data.error) {
                    chatBox.innerHTML += `<div class="message claude"><span class="claude-label">Error:</span> ${escapeHtml(data.error)}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message claude"><span class="claude-label">Ramcha:</span> ${escapeHtml(data.reply)}</div>`;
                }
            } catch (err) {
                chatBox.innerHTML += `<div class="message claude"><span class="claude-label">Error:</span> Network error. Please try again.</div>`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
                chatBox.scrollTop = chatBox.scrollHeight;
                input.focus();
            }
        }

        async function resetChat() {
            await fetch('/reset', {method: 'POST'});
            document.getElementById("chat-box").innerHTML = "";
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
