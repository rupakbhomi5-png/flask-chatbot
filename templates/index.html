<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fav.farm/🤖">
    <title>{{ store_name }}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
                align-items: center;
                justify-content: center;
            }
            .chat-container {
                height: 88dvh;
                border-radius: 14px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            }
        }

        /* ── Header ── */
        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid #e8eaed;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .reset-btn {
            background: none;
            border: 1px solid #ddd;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .reset-btn:hover {
            background: #f1f3f5;
        }

        /* ── Message list ── */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .message {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 15px;
            max-width: 80%;
            word-break: break-word;
        }

        .user {
            background-color: #0066cc;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            background-color: #f1f3f5;
            color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .assistant-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* ── Input bar ── */
        .input-area {
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            border-top: 1px solid #e8eaed;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            background: #f6f8fa;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        #user-input:focus {
            border-color: #0066cc;
            background: #fff;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
            padding: 0;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        #send-btn {
            background: #0066cc;
            color: #fff;
        }

        #send-btn:hover {
            background: #0052a3;
        }

        #send-btn:disabled {
            background: #99bfe8;
            cursor: not-allowed;
        }

        #mic-btn {
            background: #f1f3f5;
            color: #444;
        }

        #mic-btn:hover {
            background: #e1e4e8;
        }

        #mic-btn.listening {
            background: #e53935;
            color: #fff;
            animation: pulse 1.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <div class="chat-header">
            <h1>{{ store_name }}</h1>
            <button class="reset-btn" onclick="resetChat()">New chat</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off"/>
            <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
            <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script>
        const BOT_NAME = "{{ bot_name }}";

        function appendMessage(sender, text, cssClass) {
            const box = document.getElementById("chat-box");
            const msg = document.createElement("div");
            msg.className = `message ${cssClass}`;
            if (cssClass === "assistant") {
                msg.innerHTML = `<span class="assistant-label">${sender}</span><span class="msg-text">${text}</span>`;
            } else {
                msg.innerHTML = `<span class="msg-text">${text}</span>`;
            }
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
            return msg.querySelector(".msg-text");
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const userMessage = input.value.trim();
            if (!userMessage) return;

            input.value = "";
            input.disabled = true;
            const sendBtn = document.getElementById("send-btn");
            if (sendBtn) sendBtn.disabled = true;

            appendMessage("You", escapeHtml(userMessage), "user");
            const botEl = appendMessage(BOT_NAME, "", "assistant");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userMessage }),
                });

                if (!response.ok || !response.body) {
                    botEl.textContent = "Error: could not reach server.";
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const payload = JSON.parse(line.slice(6));
                            if (payload.token) {
                                botEl.textContent += payload.token;
                                const chat = document.getElementById("chat-box");
                                if (chat) chat.scrollTop = chat.scrollHeight;
                            } else if (payload.error) {
                                botEl.textContent = payload.error;
                            }
                        } catch (_) {}
                    }
                }
            } catch (err) {
                botEl.textContent = "Network error. Please try again.";
            } finally {
                input.disabled = false;
                if (sendBtn) sendBtn.disabled = false;
                input.focus();
            }
        }

        async function resetChat() {
            await fetch("/reset", { method: "POST" });
            document.getElementById("chat-box").innerHTML = "";
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        // ── Mic / Speech Recognition ──────────────────────────────────
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const micBtn = document.getElementById("mic-btn");

        if (!SpeechRecognition) {
            micBtn.style.display = "none";
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = "ne-NP"; // Nepali; falls back to en-US on error

            let listening = false;

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById("user-input").value = transcript;
                sendMessage();
            };

            recognition.onend = function() {
                listening = false;
                micBtn.classList.remove("listening");
            };

            recognition.onerror = function(e) {
                listening = false;
                micBtn.classList.remove("listening");
                if (e.error === "language-not-supported") {
                    recognition.lang = "en-US";
                }
            };

            window.toggleMic = function() {
                if (listening) {
                    recognition.stop();
                } else {
                    recognition.start();
                    listening = true;
                    micBtn.classList.add("listening");
                }
            };
        }
    </script>
</body>
</html>
