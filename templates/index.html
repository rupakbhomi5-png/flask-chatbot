<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <title>{{ store_name }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
        }

        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        #chat-box {
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            clear: both;
        }

        .user {
            background-color: #e6f2ff;
            border-left: 4px solid #0066cc;
            color: #003366;
        }

        .user-label {
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 5px;
            display: block;
        }

        .assistant {
            background-color: #f6f8fa;
            border-left: 4px solid #24292e;
            color: #24292e;
        }

        .assistant-label {
            font-weight: bold;
            color: #24292e;
            margin-bottom: 5px;
            display: block;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        #user-input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
        }

        button {
            padding: 12px 24px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>{{ store_name }}</h1>

        <div id="chat-box"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..."/>
            <button id="send-btn" onclick="sendMessage()">Send</button>
            <button onclick="resetChat()" style="background-color: #cc3300;">Reset</button>
        </div>
    </div>

    <script>
        // FIX: BOT_NAME comes from Flask via Jinja2 — not hardcoded
        // Flask replaces {{ bot_name }} with the value from products.json before
        // sending this HTML to the browser. Next client = change products.json only.
        const BOT_NAME = "{{ bot_name }}";

        // FIX: appendMessage is now a real working function, not a comment.
        // It creates a message bubble and returns the <span> we write tokens into.
        function appendMessage(sender, text, cssClass) {
            const box = document.getElementById("chat-box");
            const msg = document.createElement("div");
            msg.className = `message ${cssClass}`;
            msg.innerHTML = `<strong class="${cssClass}-label">${sender}:</strong> <span class="msg-text">${text}</span>`;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
            return msg.querySelector(".msg-text"); // callers write tokens to this span
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const userMessage = input.value.trim();
            if (!userMessage) return;

            input.value = "";
            input.disabled = true;
            const sendBtn = document.getElementById("send-btn");
            if (sendBtn) sendBtn.disabled = true;

            appendMessage("You", escapeHtml(userMessage), "user");

            // FIX: use BOT_NAME variable, correct arg order: (sender, initialText, cssClass)
            const botEl = appendMessage(BOT_NAME, "", "assistant");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userMessage }),
                });

                if (!response.ok || !response.body) {
                    botEl.textContent = "Error: could not reach server.";
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // SSE chunks may be split across reads — buffer and split on newlines
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // last line may be incomplete, keep it

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const payload = JSON.parse(line.slice(6));
                            if (payload.token) {
                                botEl.textContent += payload.token;
                                const chat = document.getElementById("chat-box");
                                if (chat) chat.scrollTop = chat.scrollHeight;
                            } else if (payload.error) {
                                botEl.textContent = payload.error;
                            }
                            // payload.done === true means stream finished — nothing to do
                        } catch (_) {}
                    }
                }
            } catch (err) {
                botEl.textContent = "Network error. Please try again.";
            } finally {
                input.disabled = false;
                if (sendBtn) sendBtn.disabled = false;
                input.focus();
            }
        }

        async function resetChat() {
            await fetch('/reset', { method: 'POST' });
            document.getElementById("chat-box").innerHTML = "";
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
