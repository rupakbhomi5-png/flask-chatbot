<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fav.farm/⚡">
    <title>{{ store_name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: #17C3D4;
            --brand-dark: #0FA8B8;
            --brand-light: #E0F8FA;
            --accent: #FF8C42;
            --bg: #F4FCFD;
            --surface: #ffffff;
            --text: #1a2e30;
            --text-soft: #5a7a7e;
            --border: #C8EEF2;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        @media (min-width: 768px) {
            body { padding: 24px; align-items: center; justify-content: center; }
            .chat-container {
                height: 88dvh;
                border-radius: 20px;
                box-shadow: 0 8px 32px rgba(23, 195, 212, 0.15);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, var(--brand) 0%, #0FA8CC 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-radius: 20px 20px 0 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .header-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 1px;
        }

        .online-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #4DFFB4;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .reset-btn:hover { background: rgba(255,255,255,0.3); }

        .welcome {
            background: var(--brand-light);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text-soft);
            text-align: center;
            flex-shrink: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            padding: 11px 15px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 14.5px;
            max-width: 80%;
            word-break: break-word;
        }

        .user {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(23, 195, 212, 0.3);
        }

        .assistant {
            background: #f4f6f7;
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .assistant-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--brand-dark);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-area {
            padding: 12px 14px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 14.5px;
            background: var(--bg);
            outline: none;
            color: var(--text);
            transition: border-color 0.15s, background 0.15s;
        }

        #user-input:focus {
            border-color: var(--brand);
            background: #fff;
        }

        #user-input::placeholder { color: #a0b8bb; }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            transition: all 0.15s;
            padding: 0;
        }

        .icon-btn:active { transform: scale(0.9); }

        #send-btn {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff;
            box-shadow: 0 2px 8px rgba(23, 195, 212, 0.35);
        }

        #send-btn:hover { background: linear-gradient(135deg, var(--brand-dark), #0990A0); }
        #send-btn:disabled { background: #b0e6ec; box-shadow: none; cursor: not-allowed; }

        #mic-btn { background: var(--brand-light); color: var(--brand-dark); }
        #mic-btn:hover { background: #c8f0f4; }

        #mic-btn.listening {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(255,140,66,0.4);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
<div class="chat-container">

    <div class="chat-header">
        <div class="header-left">
            <div class="bot-avatar">⚡</div>
            <div class="header-info">
                <h1>{{ store_name }}</h1>
                <p><span class="online-dot"></span>Online now</p>
            </div>
        </div>
        <button class="reset-btn" onclick="resetChat()">New chat</button>
    </div>

    <div class="welcome">
        👋 Hi! Ask me about products, prices, or anything about the store.
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about a product..." autocomplete="off"/>
        <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
        <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

</div>
<script>
    const BOT_NAME = "{{ bot_name }}";

    // Conversation history lives here — sent to server with every message,
    // returned updated in the done event. Server holds zero state.
    let conversationHistory = [];

    function appendMessage(sender, text, cssClass) {
        const box = document.getElementById("chat-box");
        const msg = document.createElement("div");
        msg.className = `message ${cssClass}`;
        if (cssClass === "assistant") {
            msg.innerHTML = `<span class="assistant-label">${sender}</span><span class="msg-text">${text}</span>`;
        } else {
            msg.innerHTML = `<span class="msg-text">${text}</span>`;
        }
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
        return msg.querySelector(".msg-text");
    }

    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const userMessage = input.value.trim();
        if (!userMessage) return;

        input.value = "";
        input.disabled = true;
        const sendBtn = document.getElementById("send-btn");
        if (sendBtn) sendBtn.disabled = true;

        appendMessage("You", escapeHtml(userMessage), "user");
        const botEl = appendMessage(BOT_NAME, "", "assistant");

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // Send history with every message so server stays stateless
                body: JSON.stringify({ message: userMessage, history: conversationHistory }),
            });

            if (!response.ok || !response.body) {
                botEl.textContent = "Error: could not reach server.";
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith("data: ")) continue;
                    try {
                        const payload = JSON.parse(line.slice(6));
                        if (payload.token) {
                            botEl.textContent += payload.token;
                            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
                        } else if (payload.done && payload.history) {
                            // Store updated history so next message includes full context
                            conversationHistory = payload.history;
                        } else if (payload.error) {
                            botEl.textContent = payload.error;
                        }
                    } catch (_) {}
                }
            }
        } catch (err) {
            botEl.textContent = "Network error. Please try again.";
        } finally {
            input.disabled = false;
            if (sendBtn) sendBtn.disabled = false;
            input.focus();
        }
    }

    async function resetChat() {
        // Clear local history — server has nothing to clear
        conversationHistory = [];
        await fetch("/reset", { method: "POST" });
        document.getElementById("chat-box").innerHTML = "";
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    // ── Mic ──────────────────────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById("mic-btn");

    if (!SpeechRecognition) {
        micBtn.style.display = "none";
    } else {
        let recognition = null;
        let listening = false;

        function buildRecognition(lang) {
            const r = new SpeechRecognition();
            r.continuous = true;
            r.interimResults = false;
            r.lang = lang;

            r.onresult = function(event) {
                const transcript = event.results[event.results.length - 1][0].transcript;
                document.getElementById("user-input").value = transcript;
                sendMessage();
                recognition.stop();
            };

            r.onend = function() {
                listening = false;
                micBtn.classList.remove("listening");
                micBtn.title = "Voice input";
            };

            r.onerror = function(e) {
                listening = false;
                micBtn.classList.remove("listening");
                if (e.error === "language-not-supported") recognition = buildRecognition("en-US");
                if (e.error === "not-allowed") micBtn.title = "Mic access denied — allow in browser settings";
                if (e.error === "network") micBtn.title = "Speech needs internet";
            };

            return r;
        }

        recognition = buildRecognition("ne-NP");

        window.toggleMic = function() {
            if (listening) {
                recognition.stop();
                return;
            }
            try {
                recognition.start();
                listening = true;
                micBtn.classList.add("listening");
                micBtn.title = "Listening... tap to stop";
            } catch(e) {
                micBtn.title = "Could not start mic: " + e.message;
            }
        };
    }
</script>
</body>
</html>
