<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
    <style>
        /* Base Page Setup */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
        }

        /* Main Wrapper */
        .chat-container {
            max-width: 800px;
            margin: 0 auto; /* Centers the whole block */
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
        }

        /* Title Styling */
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        /* The Chat History Box */
        #chat-box {
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* General Message Formatting */
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            clear: both; /* Prevents floating issues */
        }

        /* User Message */
        .user {
            background-color: #e6f2ff; /* Light blue background */
            border-left: 4px solid #0066cc; /* Blue accent line */
            color: #003366;
        }

        .user-label {
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 5px;
            display: block;
        }

        /* Claude/Bot Message */
        .claude {
            background-color: #f6f8fa; /* Light gray background */
            border-left: 4px solid #24292e; /* Dark accent line */
            color: #24292e;
        }

        .claude-label {
            font-weight: bold;
            color: #24292e;
            margin-bottom: 5px;
            display: block;
        }

        /* Input Area Setup */
        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        #user-input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
        }

        button {
            padding: 12px 24px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <h1>My AI Chatbot</h1>

    <div id="chat-box"</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..."/>
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();

            if (!message) return;

            chatBox.innerHTML += `<div class="message"><span class="user">You:</span> ${message}</div>`;
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json"},
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            chatBox.innerHTML += `<div class="message"><span class="claude">Claude:</span> ${data.reply}</div>`;
            chatBox. scrollTop = chatBox.scrollHeight;         
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
