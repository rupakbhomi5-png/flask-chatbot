<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fav.farm/🌸">
    <title>{{ store_name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: #C4756A;
            --brand-dark: #A85D53;
            --brand-light: #FAEAE8;
            --accent: #E8A598;
            --bg: #FFF8F6;
            --surface: #ffffff;
            --text: #2d1f1e;
            --text-soft: #8a6560;
            --border: #F0D8D4;
        }

        body {
            font-family: 'Segoe UI', Georgia, sans-serif;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        @media (min-width: 768px) {
            body { padding: 24px; align-items: center; justify-content: center; }
            .chat-container {
                height: 88dvh;
                border-radius: 20px;
                box-shadow: 0 8px 32px rgba(196, 117, 106, 0.15);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #D4877C 0%, #C4756A 60%, #B06258 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-radius: 20px 20px 0 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 2px;
        }

        .online-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #AFFFDA;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .reset-btn:hover { background: rgba(255,255,255,0.3); }

        .welcome {
            background: var(--brand-light);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text-soft);
            text-align: center;
            flex-shrink: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            background: var(--bg);
        }

        .message {
            padding: 11px 15px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14.5px;
            max-width: 80%;
            word-break: break-word;
        }

        .user {
            background: linear-gradient(135deg, #D4877C 0%, var(--brand-dark) 100%);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(196, 117, 106, 0.3);
        }

        .assistant {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(196, 117, 106, 0.08);
        }

        .assistant-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--brand);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-area {
            padding: 12px 14px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 14.5px;
            background: var(--bg);
            outline: none;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.15s, background 0.15s;
        }

        #user-input:focus {
            border-color: var(--brand);
            background: var(--surface);
        }

        #user-input::placeholder { color: #c9a09a; }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            transition: all 0.15s;
            padding: 0;
        }

        .icon-btn:active { transform: scale(0.9); }

        #send-btn {
            background: linear-gradient(135deg, #D4877C, var(--brand-dark));
            color: #fff;
            box-shadow: 0 2px 8px rgba(196, 117, 106, 0.35);
        }

        #send-btn:hover { filter: brightness(1.05); }
        #send-btn:disabled { background: #e8b8b3; box-shadow: none; cursor: not-allowed; }

        #mic-btn { background: var(--brand-light); color: var(--brand); }
        #mic-btn:hover { background: #f5d8d4; }

        #mic-btn.listening {
            background: var(--brand);
            color: #fff;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Dark mode — toggled via [data-theme] on <html>, defaults to system preference */
        :root[data-theme="dark"] {
            --bg: #10131a;
            --surface: #1a1e28;
            --text: #E8EAF0;
            --text-soft: #8B93A3;
            --border: #2C313F;
            --header-bg: #0A0C11;
            --header-bg2: #14171F;
        }
        :root[data-theme="dark"] .welcome {
            background: rgba(255,255,255,0.05);
            border-bottom-color: var(--border);
            color: var(--text-soft);
        }
        :root[data-theme="dark"] .assistant {
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
        :root[data-theme="dark"] .qr-btn {
            background: var(--surface);
            border-color: var(--border);
            color: var(--text);
        }
        :root[data-theme="dark"] .qr-btn:hover {
            border-color: var(--brand);
            background: rgba(255,255,255,0.04);
        }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s;
        }
        .theme-btn:hover { background: rgba(255,255,255,0.2); }

        .quick-replies {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 2px 2px 4px;
        }
        .qr-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-align: left;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .qr-btn::after {
            content: "→";
            color: var(--brand);
            font-weight: 700;
            margin-left: 10px;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .qr-btn:hover { border-color: var(--brand); background: var(--brand-light); }
        .qr-btn:hover::after { transform: translateX(2px); }

        .launcher-bubble {
            display: none;
            position: relative;
            width: 100%;
            height: 100dvh;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -10px 18px rgba(0,0,0,0.12);
            animation: bubble-in 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        .launcher-bubble svg {
            width: 26px;
            height: 26px;
            position: relative;
            z-index: 1;
            animation: icon-breathe 2.6s ease-in-out infinite;
        }
        .launcher-bubble .ping-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FF4D4D;
            border: 2px solid #fff;
            animation: ping-pulse 1.8s ease-out 1s 3;
        }
        @keyframes bubble-in {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes icon-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes ping-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,77,77,0.55); }
            70% { box-shadow: 0 0 0 5px rgba(255,77,77,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); }
        }
        .close-widget-btn { display: none; }
    </style>
</head>
<body>
<button class="launcher-bubble" id="launcher-bubble" onclick="openWidget()" title="Open chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    <span class="ping-dot" id="ping-dot"></span>
</button>
<div class="chat-container">

    <div class="chat-header">
        <div class="header-left">
            <div class="bot-avatar">🌸</div>
            <div class="header-info">
                <h1>{{ store_name }}</h1>
                <p><span class="online-dot"></span>Here to help</p>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-btn close-widget-btn" id="close-widget-btn" onclick="closeWidget()" title="Close">✕</button>
            <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
            <button class="reset-btn" onclick="resetChat()">New chat</button>
        </div>
    </div>

    <div class="welcome">
        ✨ Welcome! Ask me about services, pricing, or book an appointment.
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="How can I help you today?" autocomplete="off"/>
        <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
        <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

</div>
<script>
    const BOT_NAME = "{{ bot_name }}";

    // Embeddable-widget mode: only active when a client's /embed.js loader
    // put this page in an iframe with ?embed=1. Direct visits (sales links,
    // demos) are untouched — IS_EMBED stays false and nothing below fires.
    const IS_EMBED = new URLSearchParams(location.search).get("embed") === "1";

    function postToParent(state) {
        if (window.parent !== window) {
            window.parent.postMessage({ type: "rupakco-widget-resize", state: state }, "*");
        }
    }

    function openWidget() {
        document.querySelector(".chat-container").style.display = "flex";
        document.getElementById("launcher-bubble").style.display = "none";
        document.getElementById("close-widget-btn").style.display = "flex";
        const pingDot = document.getElementById("ping-dot");
        if (pingDot) pingDot.remove();
        postToParent("open");
        document.getElementById("user-input").focus();
    }

    function closeWidget() {
        document.querySelector(".chat-container").style.display = "none";
        document.getElementById("launcher-bubble").style.display = "flex";
        document.getElementById("close-widget-btn").style.display = "none";
        postToParent("closed");
    }

    if (IS_EMBED) {
        document.querySelector(".chat-container").style.display = "none";
        document.getElementById("launcher-bubble").style.display = "flex";
    }

    // Clicking outside the widget (on the client's own page) collapses it
    // back to the bubble, same as pressing the X. The parent frame (embed.js)
    // detects the outside click and relays this message in.
    window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "rupakco-widget-collapse") closeWidget();
    });

    const GREETING_TEXT = "Hi! ✨ I'm " + BOT_NAME + ". Here to help with services, pricing, or booking. What can I help with?";
    const QUICK_REPLIES = [
        { label: "💇 Book an appointment", msg: "I'd like to book an appointment" },
        { label: "💅 Services & pricing", msg: "What services and pricing do you offer?" },
        { label: "💬 General question", msg: "I have a general question" }
    ];

    // Theme: explicit choice in localStorage wins, otherwise follow system preference.
    (function initTheme() {
        const saved = localStorage.getItem("theme");
        const theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
    })();

    function toggleTheme() {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        document.getElementById("theme-btn").textContent = next === "dark" ? "☀️" : "🌙";
    }
    document.getElementById("theme-btn").textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";

    // Conversation history lives in sessionStorage so it survives a page
    // refresh (F5) within the same tab, but never leaks between different
    // tabs/visitors — sessionStorage is per-tab and clears when the tab closes.
    // Server stays fully stateless either way (see app_memory.py comment block).
    let conversationHistory = JSON.parse(sessionStorage.getItem("conversationHistory") || "[]");

    function appendMessage(sender, text, cssClass) {
        const box = document.getElementById("chat-box");
        const msg = document.createElement("div");
        msg.className = `message ${cssClass}`;
        if (cssClass === "assistant") {
            msg.innerHTML = `<span class="assistant-label">${sender}</span><span class="msg-text">${text}</span>`;
        } else {
            msg.innerHTML = `<span class="msg-text">${text}</span>`;
        }
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
        return msg.querySelector(".msg-text");
    }

    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    // Redraw any history restored from sessionStorage so the visible chat
    // log matches what the server will see on the next message.
    function renderStoredHistory() {
        for (const turn of conversationHistory) {
            if (turn.role === "user") {
                appendMessage("You", escapeHtml(turn.content), "user");
            } else if (turn.role === "assistant") {
                appendMessage(BOT_NAME, escapeHtml(turn.content), "assistant");
            }
        }
    }

    // First visit (or right after a reset) the chat box is empty — show a
    // greeting bubble with quick-reply chips instead of a blank panel.
    function showGreeting() {
        appendMessage(BOT_NAME, GREETING_TEXT, "assistant");
        const box = document.getElementById("chat-box");
        const chips = document.createElement("div");
        chips.className = "quick-replies";
        chips.id = "quick-replies";
        QUICK_REPLIES.forEach(qr => {
            const btn = document.createElement("button");
            btn.className = "qr-btn";
            btn.type = "button";
            btn.textContent = qr.label;
            btn.addEventListener("click", () => {
                document.getElementById("user-input").value = qr.msg;
                chips.remove();
                sendMessage();
            });
            chips.appendChild(btn);
        });
        box.appendChild(chips);
    }

    if (conversationHistory.length > 0) {
        renderStoredHistory();
    } else {
        showGreeting();
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const userMessage = input.value.trim();
        if (!userMessage) return;

        input.value = "";
        input.disabled = true;
        const sendBtn = document.getElementById("send-btn");
        if (sendBtn) sendBtn.disabled = true;

        appendMessage("You", escapeHtml(userMessage), "user");
        const botEl = appendMessage(BOT_NAME, "", "assistant");

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // Send history with every message so server stays stateless
                body: JSON.stringify({ message: userMessage, history: conversationHistory }),
            });

            if (!response.ok || !response.body) {
                botEl.textContent = "Error: could not reach server.";
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith("data: ")) continue;
                    try {
                        const payload = JSON.parse(line.slice(6));
                        if (payload.token) {
                            botEl.textContent += payload.token;
                            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
                        } else if (payload.done && payload.history) {
                            // Store updated history so next message includes full context
                            conversationHistory = payload.history;
                            sessionStorage.setItem("conversationHistory", JSON.stringify(conversationHistory));
                        } else if (payload.error) {
                            botEl.textContent = payload.error;
                        }
                    } catch (_) {}
                }
            }
        } catch (err) {
            botEl.textContent = "Network error. Please try again.";
        } finally {
            input.disabled = false;
            if (sendBtn) sendBtn.disabled = false;
            input.focus();
        }
    }

    async function resetChat() {
        // Clear local history — server has nothing to clear
        conversationHistory = [];
        sessionStorage.removeItem("conversationHistory");
        await fetch("/reset", { method: "POST" });
        document.getElementById("chat-box").innerHTML = "";
        showGreeting();
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    // ── Mic ──────────────────────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById("mic-btn");

    if (!SpeechRecognition) {
        micBtn.style.display = "none";
    } else {
        let recognition = null;
        let listening = false;

        function buildRecognition(lang) {
            const r = new SpeechRecognition();
            r.continuous = true;
            r.interimResults = false;
            r.lang = lang;

            r.onresult = function(event) {
                const transcript = event.results[event.results.length - 1][0].transcript;
                document.getElementById("user-input").value = transcript;
                sendMessage();
                recognition.stop();
            };

            r.onend = function() {
                listening = false;
                micBtn.classList.remove("listening");
                micBtn.title = "Voice input";
            };

            r.onerror = function(e) {
                listening = false;
                micBtn.classList.remove("listening");
                if (e.error === "language-not-supported") recognition = buildRecognition("en-US");
                if (e.error === "not-allowed") micBtn.title = "Mic access denied — allow in browser settings";
                if (e.error === "network") micBtn.title = "Speech needs internet";
            };

            return r;
        }

        recognition = buildRecognition("ne-NP");

        window.toggleMic = function() {
            if (listening) {
                recognition.stop();
                return;
            }
            try {
                recognition.start();
                listening = true;
                micBtn.classList.add("listening");
                micBtn.title = "Listening... tap to stop";
            } catch(e) {
                micBtn.title = "Could not start mic: " + e.message;
            }
        };
    }
</script>
</body>
</html>
